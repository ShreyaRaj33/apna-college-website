<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Form</title>
</head>

<body>

<header>
<h1>Apna College Subscription Form</h1>
</header>

<main>

<h3>Fill up the form, select your course and proceed to payment</h3>

<form action="/action.php">

<label for="username">Username:</label><br>
<input type="text" id="username" name="username" placeholder="Enter Username"><br><br>


<label for="password">Set Password:</label><br>
<input type="password" id="password" name="password" placeholder="Enter Password"><br><br>


<label for="name">Full Name:</label><br>
<input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

<p>Select your current academic status:</p>

<input type="radio" id="year1" name="college" value="I year">
<label for="year1">I Year</label><br>

<input type="radio" id="year2" name="college" value="II year">
<label for="year2">II Year</label><br>

<input type="radio" id="year3" name="college" value="III year">
<label for="year3">III Year</label><br>

<input type="radio" id="year4" name="college" value="IV year">
<label for="year4">IV Year</label><br>

<input type="radio" id="year5" name="college" value="Passout">
<label for="year5">Passout</label><br>

<input type="radio" id="year6" name="college" value="Masters I Year">
<label for="year6">Master's I Year</label><br>

<input type="radio" id="year7" name="college" value="Masters II Year">
<label for="year7">Master's II Year</label><br>

<input type="radio" id="year8" name="college" value="School Student">
<label for="year8">School Student</label><br><br>


<label for="city">Select your city:</label><br>

<select name="city" id="city">

<option value="Dehri">Dehri</option>
<option value="Aurangabad">Aurangabad</option>
<option value="Ahmedabad">Ahmedabad</option>
<option value="Bhopal">Bhopal</option>
<option value="Bangalore">Bangalore</option>
<option value="Delhi">Delhi</option>
<option value="Dehradun">Dehradun</option>
<option value="Indore">Indore</option>
<option value="Mumbai">Mumbai</option>
<option value="Pune">Pune</option>
<option value="Panji">Panji</option>
<option value="Varanasi">Varanasi</option>

</select>

<br><br>

<label for="course">Select Course:</label><br>

<select name="course" id="course">

<option value="DSA">DSA</option>
<option value="C++">C++</option>
<option value="Frontend">Frontend</option>
<option value="Backend">Backend</option>
<option value="AI">AI</option>
<option value="Java">Java</option>
<option value="Python">Python</option>
<option value="DBMS">DBMS</option>
<option value="Fullstack">Fullstack</option>
<option value="Mernstack">Mernstack</option>
<option value="Golang">Golang</option>
<option value="Rust">Rust</option>
<option value="C">C</option>
<option value="C#">C#</option>

</select>

<br><br>

<input type="submit" value="Subscribe and Proceed to Payment">

</form>

</main>

<footer>
<p>After submission you will be redirected to the payment page.</p>
</footer>

</body>
</html>
